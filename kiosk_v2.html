<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#204828;
  --green-l:#2d5a30;
  --green-pale:#eaf4e5;
  --green-mid:#c5e0bc;
  --dark:#111;
}
html,body{
  width:100%;height:100%;
  font-family:'Noto Sans KR',sans-serif;
  background:#fafaf8;
  overflow:hidden;
  touch-action:manipulation;
}
.bg-blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.b1{width:500px;height:500px;background:var(--green-pale);top:-180px;right:-140px}
.b2{width:360px;height:360px;background:var(--green-mid);bottom:-130px;left:-100px;opacity:.5}
.page{
  position:relative;z-index:1;
  width:100%;height:100dvh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:env(safe-area-inset-top,20px) 24px env(safe-area-inset-bottom,20px);
}
.logo-wrap{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:clamp(24px,4vh,44px);
  margin-top:clamp(12px,2vh,24px);
}
.logo-text{
  font-family:'Arial Black','Arial Bold',Arial,sans-serif;
  font-style:italic;
  font-weight:700;
  font-size:clamp(40px,7vw,64px);
  color:#204828;
  letter-spacing:0px;
  line-height:1;
}
.logo-text sup{
  font-size:0.35em;
  vertical-align:super;
  font-style:normal;
  letter-spacing:0;
}
.logo-badge{
  margin-top:9px;
  font-size:11px;font-weight:700;
  color:#aaa;letter-spacing:3px;text-transform:uppercase;
}
.card{
  background:#fff;
  border:1px solid #eaeae6;
  border-radius:clamp(20px,3vw,28px);
  padding:clamp(28px,4vh,48px) clamp(24px,4vw,48px) clamp(24px,3vh,40px);
  width:100%;max-width:440px;
  box-shadow:0 2px 32px rgba(0,0,0,0.06);
  display:flex;flex-direction:column;align-items:center;
}
.card-title{
  font-size:clamp(17px,2.5vw,22px);font-weight:700;
  color:var(--dark);letter-spacing:-0.4px;
  margin-bottom:5px;text-align:center;
}
.card-sub{
  font-size:clamp(13px,1.8vw,15px);color:#aaa;
  margin-bottom:clamp(24px,3.5vh,36px);
  text-align:center;line-height:1.6;
}
.display{display:flex;gap:clamp(8px,1.5vw,14px);margin-bottom:clamp(20px,3vh,32px)}
.digit-box{
  width:clamp(62px,14vw,80px);height:clamp(70px,11vh,88px);
  border-radius:14px;background:#f5f5f2;border:2px solid transparent;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(28px,5vw,36px);font-weight:700;
  color:var(--dark);transition:all 0.15s;
}
.digit-box.filled{background:var(--green-pale);border-color:var(--green);color:var(--green)}
.digit-box.active{border-color:var(--green);background:#fff;box-shadow:0 0 0 4px rgba(32,72,40,0.1)}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(8px,1.5vw,12px);width:100%}
.key{
  height:clamp(60px,9vh,76px);border-radius:14px;
  border:1px solid #eaeae6;background:#fff;
  font-size:clamp(22px,3.5vw,28px);font-weight:700;
  color:var(--dark);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.08s;-webkit-user-select:none;
}
.key:active{transform:scale(0.93);background:var(--green-pale);border-color:var(--green);color:var(--green)}
.key.del{font-size:clamp(16px,2.5vw,20px);color:#bbb}
.key.del:active{background:#fff5f5;border-color:#e5a5a5;color:#e24b4a}
.key.submit{
  grid-column:span 2;background:var(--green);
  color:#fff;border:none;
  font-size:clamp(14px,2vw,16px);font-weight:600;letter-spacing:0.5px;
}
.key.submit:active{transform:scale(0.97);background:var(--green-l)}
.key.submit:disabled{opacity:.35;cursor:not-allowed;transform:none}
.overlay{
  display:none;position:fixed;inset:0;z-index:100;
  align-items:center;justify-content:center;padding:24px;
}
.overlay.show{display:flex}
.overlay-bg{
  position:absolute;inset:0;
  background:rgba(250,250,248,0.75);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
}
.result-card{
  position:relative;z-index:1;background:#fff;
  border:1px solid #eaeae6;border-radius:28px;
  padding:clamp(36px,5vh,52px) clamp(28px,4vw,48px);
  width:100%;max-width:400px;text-align:center;
  box-shadow:0 8px 50px rgba(0,0,0,0.1);
  animation:popIn 0.28s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn{from{transform:scale(0.82);opacity:0}to{transform:scale(1);opacity:1}}
.r-icon{
  width:clamp(64px,10vw,80px);height:clamp(64px,10vw,80px);
  border-radius:50%;margin:0 auto clamp(16px,2.5vh,24px);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(28px,4vw,36px);
}
.r-icon.ok{background:var(--green-pale);color:var(--green)}
.r-icon.err{background:#fcebeb;color:#e24b4a}
.r-name{font-size:clamp(20px,3.5vw,28px);font-weight:700;letter-spacing:-0.5px;margin-bottom:6px}
.r-name.ok{color:var(--dark)}
.r-name.err{color:#e24b4a}
.r-msg{font-size:clamp(13px,1.8vw,15px);color:#aaa;margin-bottom:clamp(20px,3vh,28px);line-height:1.6}
.r-remain{
  display:inline-flex;align-items:center;gap:8px;
  border-radius:40px;padding:10px 24px;
  font-size:14px;font-weight:600;
}
.r-remain.ok{background:var(--green-pale);color:var(--green)}
.r-remain.last{background:#fff8e8;color:#b07800}
.r-remain .num{font-size:clamp(22px,3.5vw,28px);font-weight:700}
.r-timer{margin-top:clamp(16px,2.5vh,24px);font-size:12px;color:#ddd;letter-spacing:0.5px}
.status-bar{
  margin-top:clamp(16px,2.5vh,24px);
  display:flex;align-items:center;gap:7px;
  font-size:11px;color:#ccc;letter-spacing:0.3px;
}
.dot{width:6px;height:6px;border-radius:50%;background:#1d9e75}

.cs-btn{width:100%;padding:12px 16px;background:#fff;border:1px solid #e0e0da;border-radius:12px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;transition:all .15s}
.cs-btn:hover{background:#f5f5f0;border-color:#bbb}
.cs-time{font-size:12px;color:#aaa;font-weight:400}
.cs-cat{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
</style>
</head>
<body>
<div class="bg-blob b1"></div>
<div class="bg-blob b2"></div>

<div class="page">
  <div class="logo-wrap">
    <div class="logo-text">mu:tudio<sup>®</sup></div>
    <div class="logo-badge">Check-in</div>
  </div>

  <div class="card">
    <div class="card-title">안녕하세요!</div>
    <div class="card-sub">전화번호 뒷자리 4자리를<br>입력해 주세요<br><span style="font-size:0.85em;color:#bbb">Enter last 4 digits</span></div>
    <div class="display">
      <div class="digit-box active" id="d0">-</div>
      <div class="digit-box" id="d1">-</div>
      <div class="digit-box" id="d2">-</div>
      <div class="digit-box" id="d3">-</div>
    </div>
    <div class="keypad">
      <button class="key" onclick="press('1')">1</button>
      <button class="key" onclick="press('2')">2</button>
      <button class="key" onclick="press('3')">3</button>
      <button class="key" onclick="press('4')">4</button>
      <button class="key" onclick="press('5')">5</button>
      <button class="key" onclick="press('6')">6</button>
      <button class="key" onclick="press('7')">7</button>
      <button class="key" onclick="press('8')">8</button>
      <button class="key" onclick="press('9')">9</button>
      <button class="key del" onclick="del()">⌫</button>
      <button class="key" onclick="press('0')">0</button>
      <button class="key submit" id="submit-btn" onclick="submit()" disabled style="flex-direction:column;gap:3px;height:clamp(70px,10vh,88px)">체크인<span style="font-size:10px;font-weight:400;letter-spacing:2px;opacity:0.7">CHECK-IN</span></button>
    </div>
  </div>

  <div class="status-bar">
    <span class="dot"></span>
    <span>연결됨</span>
  </div>
</div>


<div class="overlay" id="class-overlay" style="display:none">
  <div class="overlay-bg"></div>
  <div class="result-card" style="max-width:400px;width:90vw">
    <div style="font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:4px" id="cs-name"></div>
    <div style="font-size:13px;color:#888;margin-bottom:20px">오늘 수업을 선택해 주세요</div>
    <div id="cs-classes" style="display:flex;flex-direction:column;gap:8px;width:100%;margin-bottom:16px"></div>
    <button onclick="cancelClassSelect()" style="width:100%;padding:10px;background:transparent;border:1px solid #ddd;border-radius:10px;font-family:inherit;font-size:13px;color:#aaa;cursor:pointer">← 취소 (차감 안 함)</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-bg"></div>
  <div class="result-card">
    <div class="r-icon" id="r-icon">✓</div>
    <div class="r-name" id="r-name"></div>
    <div class="r-msg" id="r-msg"></div>
    <div id="r-extra"></div>
    <div class="r-timer" id="r-timer"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey:"AIzaSyBvHYAMLzrVW4YlhBo86zj3SNPxpQxDgcg",
  authDomain:"mutudio-academy-pass.firebaseapp.com",
  projectId:"mutudio-academy-pass",
  storageBucket:"mutudio-academy-pass.firebasestorage.app",
  messagingSenderId:"403554383066",
  appId:"1:403554383066:web:5dff822eff8332b14821e3"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const payColRef = db.collection('payRecords');


const TIMETABLE={
  0:[{t:'SYA',cat:'K-POP',time:'4:30'},{t:'LEEKO',cat:'비기너',time:'4:50'},{t:'PITU',cat:'베이직',time:'5:30'},{t:'JUJU',cat:'정규',time:'5:50'},{t:'GOOSEUL',cat:'정규',time:'7:00'},{t:'HYOS',cat:'베이직',time:'7:20'},{t:'RENYO',cat:'팝업',time:'5:30'},{t:'DAIM',cat:'팝업',time:'5:30'},{t:'SUHWA',cat:'팝업',time:'5:30'},{t:'JIOH',cat:'팝업',time:'8:20'},{t:'JIA',cat:'팝업',time:'8:20'}],
  1:[{t:'MANDUCK',cat:'정규',time:'6:10'},{t:'LINY',cat:'정규',time:'7:20'},{t:'WANNA',cat:'베이직',time:'7:30'},{t:'HYOS',cat:'팝업',time:'8:40'},{t:'MINA MYOUNG',cat:'팝업',time:'8:40'},{t:'SIR',cat:'팝업',time:'8:40'}],
  2:[{t:'CHAERIN',cat:'K-POP',time:'6:00'},{t:'HINARI',cat:'정규',time:'6:10'},{t:'BUCKEY',cat:'팝업',time:'7:20'},{t:'KUNA',cat:'팝업',time:'7:20'},{t:'PITU',cat:'팝업',time:'7:20'},{t:'TEDDY',cat:'정규',time:'7:30'},{t:'HYNN',cat:'팝업',time:'8:40'},{t:'NOHWON X SSONG',cat:'팝업',time:'8:40'},{t:'EVE',cat:'베이직',time:'8:50'}],
  3:[{t:'SSOJU',cat:'정규',time:'6:10'},{t:'NATTY',cat:'팝업',time:'7:20'},{t:'KAAN',cat:'팝업',time:'7:20'},{t:'HYOS',cat:'팝업',time:'7:20'},{t:'BUCKEY',cat:'팝업',time:'7:20'},{t:'EVE',cat:'정규',time:'7:30'},{t:'YENI CHO',cat:'베이직',time:'8:40'},{t:'LETDO X PITU X SSONG',cat:'팝업',time:'8:40'}],
  4:[{t:'SOPHIEHEN',cat:'정규',time:'6:10'},{t:'LEEKO',cat:'정규',time:'7:20'},{t:'MINNY PARK',cat:'정규',time:'7:30'},{t:'MAAIN',cat:'팝업',time:'7:30'},{t:'HALO',cat:'팝업',time:'7:30'},{t:'CHOCOL',cat:'정규',time:'8:40'}],
  5:[{t:'ASME',cat:'비기너',time:'6:10'},{t:'REALEE',cat:'정규',time:'7:20'},{t:'HION',cat:'팝업',time:'7:30'},{t:'JUNGWOO',cat:'정규',time:'7:30'},{t:'JJ',cat:'정규',time:'8:40'},{t:'FUNKY Y',cat:'팝업',time:'8:40'},{t:'YENI CHO',cat:'정규',time:'8:50'}],
  6:[{t:'SYA',cat:'K-POP',time:'4:10'},{t:'REALEE',cat:'비기너',time:'4:50'},{t:'MINA MYOUNG',cat:'비기너',time:'5:30'},{t:'AZHA X ARMSEOK',cat:'팝업',time:'5:30'},{t:'HYOS X COI',cat:'팝업',time:'5:30'},{t:'LETDO',cat:'정규',time:'5:50'},{t:'HANNAH',cat:'팝업',time:'7:00'},{t:'BELIEVE',cat:'정규',time:'7:00'},{t:'GUMA',cat:'팝업',time:'7:20'},{t:'HAIAN',cat:'팝업',time:'7:20'},{t:'AUSTIN',cat:'팝업',time:'7:20'},{t:'SSONG',cat:'팝업',time:'8:20'},{t:'ROSY',cat:'팝업',time:'8:20'},{t:'PIKI',cat:'팝업',time:'8:20'},{t:'TEDDY X KAAN',cat:'팝업',time:'8:20'}]
};
const CAT_COLOR_K={'정규':'#1a1a1a','팝업':'#2e7d32','비기너':'#c8b741','베이직':'#f5a623','K-POP':'#4a90d9'};
const CAT_LABEL_K={'정규':'REGULAR','팝업':'POP-UP','비기너':'BEGINNER','베이직':'BASIC','K-POP':'K-POP'};
let pendingMember=null;

let input='', timerInt=null;

function daysLeft(p){
  const now=new Date();now.setHours(0,0,0,0);
  const exp=new Date(p);exp.setDate(exp.getDate()+28);exp.setHours(0,0,0,0);
  return Math.ceil((exp-now)/86400000);
}

function press(n){ if(input.length<4){input+=n;updateDisplay();} }
function del(){ if(input.length){input=input.slice(0,-1);updateDisplay();} }

function updateDisplay(){
  for(let i=0;i<4;i++){
    const b=document.getElementById('d'+i);
    if(i<input.length){b.textContent=input[i];b.className='digit-box filled';}
    else if(i===input.length){b.textContent='-';b.className='digit-box active';}
    else{b.textContent='-';b.className='digit-box';}
  }
  document.getElementById('submit-btn').disabled=input.length<4;
}

async function submit(){
  if(input.length<4) return;
  const digits=input;
  try{
    const snap=await db.collection('members').get();
    const all=snap.docs.map(d=>({id:d.id,...d.data()}));
    let hit=all.filter(m=>m.phone&&m.phone.replace(/-/g,'').endsWith(digits));
    if(!hit.length){show('err','등록되지 않은 번호','뒷자리를 다시 확인해 주세요','');return;}
    if(hit.length>1){
      function maskName(name){
        if(name.length<=1) return name;
        if(name.length===2) return name[0]+'*';
        return name[0]+'*'+name[name.length-1];
      }
      const options = hit.map((m,i)=>`${i+1}. ${maskName(m.name)}`).join('\n');
      const choice = prompt(`같은 번호가 여러 명입니다.\n번호를 입력해 주세요:\n\n${options}`);
      const idx = parseInt(choice)-1;
      if(isNaN(idx)||idx<0||idx>=hit.length){reset();return;}
      hit=[hit[idx]];
    }
    const m=hit[0], dl=daysLeft(m.payDate);
    if(dl<=0){show('err',m.name+'님','수강권이 만료되었습니다','수강권 갱신이 필요합니다');return;}
    if(m.remaining<=0){show('err',m.name+'님','잔여 횟수가 없습니다','수강권 갱신이 필요합니다');return;}
    // 수업 선택 후 차감 — pendingMember에 멤버 정보 저장
    const expDate0=new Date(m.payDate);expDate0.setDate(expDate0.getDate()+28);
    const expStr0=(expDate0.getMonth()+1)+'월 '+expDate0.getDate()+'일';
    pendingMember={m, expStr:expStr0};
    showClassSelect(m);
  }catch(e){
    show('err','오류 발생','잠시 후 다시 시도해 주세요','');
    console.error(e);
  }
}


function showClassSelect(m){
  const dow=new Date().getDay();
  const classes=TIMETABLE[dow]||[];
  document.getElementById('cs-name').textContent=m.name+'님, 어느 수업에 참여하시나요?';
  const wrap=document.getElementById('cs-classes');
  wrap.innerHTML='';
  classes.forEach(function(c){
    const btn=document.createElement('button');
    btn.className='cs-btn';
    const col=CAT_COLOR_K[c.cat]||'#888';
    const lbl=CAT_LABEL_K[c.cat]||c.cat;
    btn.innerHTML='<span style="font-weight:600">'+c.t+'</span>'
      +'<div style="display:flex;align-items:center;gap:6px">'
      +'<span class="cs-time">'+c.time+'</span>'
      +'<span class="cs-cat" style="background:'+col+'20;color:'+col+'">'+lbl+'</span>'
      +'</div>';
    btn.addEventListener('click',function(){confirmClassSelect(c.t,c.cat,c.time);});
    wrap.appendChild(btn);
  });
  if(!classes.length){
    wrap.innerHTML='<div style="text-align:center;color:#aaa;font-size:13px;padding:12px">오늘 등록된 수업이 없습니다</div>';
  }
  document.getElementById('class-overlay').style.display='flex';
}

async function confirmClassSelect(teacher,cat,time){
  document.getElementById('class-overlay').style.display='none';
  if(!pendingMember) return;
  const {m,expStr}=pendingMember;
  pendingMember=null;
  // 수업 선택 후 차감 실행
  const now2=new Date();
  const today=now2.toISOString().split('T')[0];
  const timeStr=String(now2.getHours()).padStart(2,'0')+':'+String(now2.getMinutes()).padStart(2,'0');
  const history=[...(m.history||[]),{date:today,time:timeStr,teacher:teacher,cat:cat,id:Date.now()}];
  await db.collection('members').doc(m.id).update({remaining:m.remaining-1,history});
  const r=m.remaining-1;
  // payRecords에 기록
  const rec={
    date:today, time:timeStr,
    name:m.name, teacher:teacher, cat:cat,
    ticket:'다회권 차감', amt:0, pay:'다회권',
    note:'키오스크 체크인',
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  };
  payColRef.add(rec).catch(function(e){console.error('결제기록 저장 오류:',e);});
  const extra=(r>0
    ?`<div class="r-remain ok"><span class="num">${r}</span>회 남았습니다</div>`
    :`<div class="r-remain last">오늘이 마지막 수업입니다</div>`)
    +`<div style="margin-top:14px;background:#f8f8f5;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:500;color:#555">📅 수강권 만료일 <span style="color:#204828;font-weight:700">${expStr}</span></div>`;
  show('ok',m.name+'님, 환영합니다!','출석이 완료되었습니다',extra);
}

function cancelClassSelect(){
  // 취소 — 차감 없이 처음으로
  document.getElementById('class-overlay').style.display='none';
  pendingMember=null;
  reset();
}

function show(type,name,msg,extra){
  const icon=document.getElementById('r-icon');
  const nameEl=document.getElementById('r-name');
  icon.className='r-icon '+(type==='ok'?'ok':'err');
  icon.textContent=type==='ok'?'✓':'✕';
  nameEl.className='r-name '+(type==='ok'?'ok':'err');
  nameEl.textContent=name;
  document.getElementById('r-msg').textContent=msg;
  document.getElementById('r-extra').innerHTML=extra;
  document.getElementById('overlay').classList.add('show');
  let c=3;
  if(timerInt) clearInterval(timerInt);
  document.getElementById('r-timer').textContent=c+'초 후 자동으로 닫힙니다';
  timerInt=setInterval(()=>{
    c--;
    if(c<=0){clearInterval(timerInt);reset();}
    else document.getElementById('r-timer').textContent=c+'초 후 자동으로 닫힙니다';
  },1000);
}

function reset(){
  document.getElementById('overlay').classList.remove('show');
  input='';updateDisplay();
}

document.addEventListener('keydown',e=>{
  if(e.key>='0'&&e.key<='9') press(e.key);
  else if(e.key==='Backspace') del();
  else if(e.key==='Enter'&&input.length===4) submit();
});
</script>
</body>
</html>
